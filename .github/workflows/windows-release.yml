name: Windows Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without leading v"
        required: true
        default: "0.1.2"
      notes:
        description: "GitHub Release notes and updater notes"
        required: false
        default: "HangCore Agent v0.1.2 fixes the Kun Agent manual install entry and adds the kun-acp-adapter MVP, which bridges NomiFun ACP stdio sessions to a running local Kun HTTP/SSE loop."
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  windows-x64:
    name: Build and publish Windows x64
    runs-on: windows-latest
    env:
      CARGO_TERM_COLOR: always
      HANGCORE_REPO: Alvinzero/HangCore-Agent

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release metadata
        id: release
        shell: pwsh
        env:
          DISPATCH_VERSION: ${{ inputs.version }}
          DISPATCH_NOTES: ${{ inputs.notes }}
          EVENT_NAME: ${{ github.event_name }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if ($env:EVENT_NAME -eq "workflow_dispatch") {
            $version = $env:DISPATCH_VERSION
            $notes = $env:DISPATCH_NOTES
          } else {
            $tag = $env:REF_NAME
            $version = $tag -replace '^v', ''
            git fetch --force origin "refs/tags/$tag:refs/tags/$tag"
            $notes = git for-each-ref "refs/tags/$tag" --format='%(contents)'
            if (-not $notes) {
              $notes = git log -1 --pretty=%B
            }
          }

          $notesPath = Join-Path $env:RUNNER_TEMP "hangcore-release-notes.md"
          Set-Content -Path $notesPath -Value $notes.Trim() -Encoding UTF8
          "version=$version" >> $env:GITHUB_OUTPUT
          "notes_path=$notesPath" >> $env:GITHUB_OUTPUT

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.14"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Apply release version
        run: bun run bump ${{ steps.release.outputs.version }}

      - name: Typecheck UI
        run: bun run typecheck

      - name: Build UI dist for Tauri checks
        run: bun run build:ui

      - name: Check Rust workspace
        run: cargo check --workspace

      - name: Validate updater signing secret
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          if (-not $env:TAURI_SIGNING_PRIVATE_KEY) {
            throw "Missing TAURI_SIGNING_PRIVATE_KEY repository secret. Add the contents of apps/desktop/signing/hangcore-updater.key before publishing."
          }

      - name: Build Windows updater installer
        shell: pwsh
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: bun run build:win x64 --config apps/desktop/tauri.updater.conf.json

      - name: Generate latest.json
        shell: pwsh
        env:
          RELEASE_NOTES_FILE: ${{ steps.release.outputs.notes_path }}
        run: |
          bun scripts/make-latest-json.mjs --repo $env:HANGCORE_REPO --notes-file $env:RELEASE_NOTES_FILE --collect

          $manifest = Get-Content apps/desktop/updater/latest.json -Raw | ConvertFrom-Json
          if ($manifest.version -ne "${{ steps.release.outputs.version }}") {
            throw "latest.json version $($manifest.version) does not match ${{ steps.release.outputs.version }}"
          }
          if (-not $manifest.platforms.'windows-x86_64') {
            throw "latest.json is missing platforms.windows-x86_64"
          }
          if ($manifest.platforms.'windows-x86_64'.url -notlike "*Alvinzero/HangCore-Agent*") {
            throw "latest.json Windows URL does not point to Alvinzero/HangCore-Agent"
          }
          $exe = Get-ChildItem dist/desktop -File -Filter "*.exe" | Select-Object -First 1
          if (-not $exe) {
            throw "Missing Windows exe in dist/desktop"
          }
          $expectedAssetName = $exe.Name -replace '\s+', '.'
          $expectedUrlLeaf = [System.Uri]::EscapeDataString($expectedAssetName)
          if ($manifest.platforms.'windows-x86_64'.url -notlike "*/$expectedUrlLeaf") {
            throw "latest.json Windows URL does not match GitHub release asset name $expectedAssetName"
          }

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: hangcore-agent-windows-x64-${{ steps.release.outputs.version }}
          path: |
            dist/desktop/*.exe
            dist/desktop/*.sig
            dist/desktop/latest.json
          if-no-files-found: error

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_NOTES_FILE: ${{ steps.release.outputs.notes_path }}
        run: |
          $tag = "v${{ steps.release.outputs.version }}"
          $notesPath = $env:RELEASE_NOTES_FILE

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if ("${{ github.event_name }}" -eq "workflow_dispatch") {
            git tag -f $tag
            git push origin $tag --force
          }

          $assets = Get-ChildItem dist/desktop -File |
            Where-Object { $_.Name -like "*.exe" -or $_.Name -like "*.sig" -or $_.Name -eq "latest.json" } |
            ForEach-Object { $_.FullName }
          if (-not $assets -or $assets.Count -lt 3) {
            throw "Expected Windows exe, .sig, and latest.json assets in dist/desktop"
          }

          gh release view $tag --repo $env:HANGCORE_REPO *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $tag --repo $env:HANGCORE_REPO @assets --clobber
            gh release edit $tag --repo $env:HANGCORE_REPO --title $tag --notes-file $notesPath
          } else {
            gh release create $tag --repo $env:HANGCORE_REPO @assets --title $tag --notes-file $notesPath
          }
